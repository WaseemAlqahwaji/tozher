name: tozher
description: "A new Flutter project."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5
dependencies:
  flutter:
    sdk: flutter
  flutter_localization: ^0.4.0
  dio: ^5.9.2
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  go_router: ^17.2.3
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.3.0
  json_annotation: ^4.12.0
  hive_flutter: ^1.1.0
  retrofit: ^4.9.2
  flutter_spinkit: ^5.2.2
  url_launcher: ^6.3.2
  share_plus: ^13.2.0
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  gap: ^3.0.1
  pretty_dio_logger: ^1.4.0
  pinput: ^6.0.2
  lottie: ^3.3.3
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  image_picker: ^1.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  json_serializable: ^6.13.2
  build_runner: ^2.6.0
  retrofit_generator: ^10.2.6
  flutter_lints: ^6.0.0
  

flutter:
  uses-material-design: true

  # -- Assets ----------------------------------------------------------------
  assets:
    - assets/icons/
    - assets/images/
    - assets/lottie/
    - assets/svg/

  # -- Fonts -----------------------------------------------------------------
  fonts:
    # Inter (18pt optical size) – primary UI font
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Thin.ttf
          weight: 100
        - asset: assets/fonts/Inter_18pt-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: assets/fonts/Inter_18pt-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Inter_18pt-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/Inter_18pt-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter_18pt-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/Inter_18pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter_18pt-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_18pt-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter_18pt-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Inter_18pt-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter_18pt-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/Inter_18pt-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Inter_18pt-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/Inter_18pt-Black.ttf
          weight: 900
        - asset: assets/fonts/Inter_18pt-BlackItalic.ttf
          weight: 900
          style: italic

